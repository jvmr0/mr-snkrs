<!doctype html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>MR SNKRS</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
			crossorigin="anonymous"
		/>

		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
		/>

		<link rel="stylesheet" href="../css/mr-snkrs.css" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
			rel="stylesheet"
		/>
	</head>

	<body>
		<header>
			<div class="container-fluid d-flex justify-content-between align-items-center px-5" id="topo">
				<div class="text-start">
					<i class="bi bi-list fs-4" id="icone-menu"></i>
				</div>

				<div class="d-flex align-items-center">
					<img src="../img/logo_mr.svg" alt="MR SNKRS Logo" class="logo" />
					<span id="snkrs">SNKRS</span>
				</div>

				<div class="text-end" id="icone-carrinho">
					<i class="bi bi-cart-fill fs-4"></i>
					<span class="d-none d-md-inline">CARRINHO (1)</span>
				</div>
			</div>

			<div class="d-none d-md-block text-center align-items-center py-1" id="marcas">
				<span class="texto-marcas">NIKE</span>
				<span class="texto-marcas">JORDAN</span>
				<span class="texto-marcas">ADIDAS</span>
				<span class="texto-marcas">NEW BALANCE</span>
				<span class="texto-marcas">YEEZY</span>
			</div>

			<div class="d-flex flex-column container-fluid py-4 px-5" id="hero-section">
				<span id="hero-1">ÚLTIMOS</span>
				<span id="hero-2">DROPS</span>
				<span id="hero-line"></span>
			</div>
		</header>

		<main class="container py-1 px-5">
			<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3">
				<div class="col">
					<div class="card-produto">
						<span class="hot position-absolute z-2 m-2">HOT</span>

						<div class="img-wrapper">
							<img
								src="../img/sneakers/sneaker-1-default.png"
								alt="card1-default"
								class="img-default"
							/>
							<img src="../img/sneakers/sneaker-1-hover.png" alt="card1-hover" class="img-hover" />
						</div>

						<div class="infos px-3 d-flex flex-column">
							<span class="marca">JORDAN</span>
							<h5 class="nome-tenis">AIR JORDAN 4 RETRO</h5>
							<p class="preco">R$ 1100,00</p>
						</div>
					</div>
				</div>
			</div>
		</main>

		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
			integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
			crossorigin="anonymous"
		></script>
	</body>
</html>
